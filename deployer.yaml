version: 1

github:
  enabled: true
  owner: SuperJMN
  repo: EffectHub
  token:
    from: env
    name: GITHUB_TOKEN
  packages:
    - project: src/EffectHub.Desktop/EffectHub.Desktop.csproj
      formats:
